apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd   # must be where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/mpopov678/test-cluster.git
    targetRevision: main
    path: infra/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true