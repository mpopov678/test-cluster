apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mpopov678/test-cluster.git
    path: config
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
