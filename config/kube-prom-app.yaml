apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prom
  namespace: argocd   # must be where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/mpopov678/test-cluster.git
    targetRevision: main
    path: infra/kube-prom
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true