apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: networking
spec:
  project: default
  source:
    repoURL: https://github.com/mpopov678/test-cluster.git
    targetRevision: main
    path: infra/cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true