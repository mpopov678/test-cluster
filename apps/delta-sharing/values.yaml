name: delta-sharing
namespace: delta-sharing
image:
  repository: deltaio/delta-sharing-server
  tag: 1.4.0
  pullPolicy: IfNotPresent
replicaCount: 1
service:
  port: 8080
config:
  secretName: delta-sharing-config
  mountPath: /etc/delta-sharing
  fileName: server.yaml
  data:
    server.yaml: |
      shares: []
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
route:
  enabled: true
  name: delta-sharing-httproute
  hostname: delta-sharing.lab.mpopov.net
  gateway:
    name: eg
    namespace: networking
    sectionName: https
