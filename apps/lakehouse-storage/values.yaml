namespace: lakehouse
s3:
  endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
  secretName: lakehouse-s3
buckets:
  configMapName: lakehouse-buckets
  names:
    - warehouse
    - spark-events
    - mlflow-artifacts
    - delta-sharing
    - landing
bucketJob:
  enabled: true
  name: lakehouse-storage-buckets
  image: quay.io/minio/mc:RELEASE.2026-05-16T02-05-47Z
  backoffLimit: 3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
