apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.buckets.configMapName | quote }}
  namespace: {{ .Values.namespace | quote }}
data:
  endpoint: {{ .Values.s3.endpoint | quote }}
  buckets: {{ join "," .Values.buckets.names | quote }}
{{- range .Values.buckets.names }}
  {{ . }}: {{ printf "s3a://%s/" . | quote }}
{{- end }}
{{- if .Values.bucketJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.bucketJob.name | quote }}
  namespace: {{ .Values.namespace | quote }}
spec:
  backoffLimit: {{ .Values.bucketJob.backoffLimit }}
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: {{ .Values.bucketJob.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName | quote }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName | quote }}
                  key: AWS_SECRET_ACCESS_KEY
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set lakehouse "$S3_ENDPOINT" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              for bucket in {{ join " " .Values.buckets.names }}; do
                mc mb --ignore-existing "lakehouse/${bucket}"
              done
          resources:
{{ toYaml .Values.bucketJob.resources | indent 12 }}
{{- end }}
