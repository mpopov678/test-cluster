apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: valkey
helmCharts:
  - name: valkey
    repo: https://valkey.io/valkey-helm/
    version: v0.9.4
    releaseName: valkey
    namespace: valkey
    includeCRDs: true

    valuesInline:
      dataStorage:
        enabled: true
        requestedSize: 10Gi


