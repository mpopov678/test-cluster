apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-httproute
  namespace: harbor
spec:
  hostnames:
  - harbor.lab.mpopov.net
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: eg
    namespace: networking
    sectionName: https
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: harbor
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /