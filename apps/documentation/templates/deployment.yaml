apiVersion: apps/v1
kind: Deployment
metadata:
  name: quartz-docs
  namespace: documentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quartz-docs
  template:
    metadata:
      labels:
        app: quartz-docs
    spec:

      volumes:
        - name: shared-data
          emptyDir: {}
        - name: caddy-config
          configMap:
            name: caddy-config
        - name: github-token
          secret:
            secretName: github-token


      containers:
        - name: quartz
          image: harbor.lab.mpopov.net/library/documentation:quartz-builder
          imagePullPolicy: Always
          volumeMounts:
          - name: shared-data
            mountPath: /quartz/shared
          - name: github-token
            mountPath: /quartz/secret

        - name: caddy
          image: caddy
          ports: 
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          volumeMounts:
          - name: shared-data
            mountPath: /usr/share/caddy
          - name: caddy-config
            mountPath: /etc/caddy

---
apiVersion: v1
kind: Service
metadata:
  name: quartz-docs
  namespace: documentation
spec:
  selector:
    app: quartz-docs
  ports:
    - name: http
      port: 80
      targetPort: 80