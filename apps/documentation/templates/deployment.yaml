apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-wiki
  namespace: documentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiki
  template:
    metadata:
      labels:
        app: wiki
    spec:
      containers:
      # --- Container 1: The Web Server ---
      - name: web-server
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: html-storage
          mountPath: /usr/share/nginx/html # Serves directly from the shared volume

      # --- Container 2: Git Sync and Auto-Builder (Sidecar) ---
      # Note: For production, you'll create a custom image containing Node/Quartz 
      # and a script that runs 'git pull && npx quartz build' when changes occur.
      - name: wiki-builder
        image: harbor.lab.mpopov.net/library/documentation:quartz-builder
        env:
        - name: REPO_URL
          value: "https://github.com/mpopov678/docu"
        - name: SYNC_INTERVAL
          value: "300" # Auto-pull and rebuild every 5 minutes
        volumeMounts:
        - name: html-storage
          mountPath: /data/public

      volumes:
      - name: html-storage
        emptyDir: {} # Ephemeral shared memory between the two containers
---
apiVersion: v1
kind: Service
metadata:
  name: wiki-service
  namespace: documentation
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: wiki