apiVersion: apps/v1
kind: Deployment
metadata:
  name: quartz-docs
  namespace: documentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quartz-docs
  template:
    metadata:
      labels:
        app: quartz-docs
    spec:

      volumes:
        - name: shared-data
          emptyDir: {}
        - name: caddy-config
          configMap:
            name: caddy-config
        - name: github-token
          secret:
            secretName: github-token
        - name: gitlab-token
          secret:
            secretName: gitlab-token


      containers:
        - name: quartz
          image: harbor.lab.mpopov.net/library/documentation:quartz-builder
          imagePullPolicy: Always
          ports: 
            - containerPort: 9000
          volumeMounts:
          - name: shared-data
            mountPath: /quartz/shared
          - name: gitlab-token
            mountPath: /quartz/secret

        - name: caddy
          image: caddy
          ports: 
            - containerPort: 8080
          volumeMounts:
          - name: shared-data
            mountPath: /usr/share/caddy
          - name: caddy-config
            mountPath: /etc/caddy
