apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.13.2
        args:
        - --registry=txt
        - --txt-prefix=external-dns-
        - --txt-owner-id=k8s
        - --provider=rfc2136
        - --rfc2136-host=192.168.88.2
        - --rfc2136-port=53
        - --rfc2136-zone=lab.mpopov.net
        - --rfc2136-zone=88.168.192.in-addr.arpa
        - --rfc2136-tsig-secret=tsig-secret
        - --rfc2136-tsig-secret-alg=hmac-sha256
        - --rfc2136-tsig-keyname=external-dns
        - --rfc2136-tsig-axfr
        - --source=ingress
        - --domain-filter=lab.mpopov.net
        - --domain-filter=88.168.192.in-addr.arpa