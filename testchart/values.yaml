      gatewayRef:
        name: eg
        namespace: networking
      installEnvoy: false
      configureCertmanager: false
      httpToHttpsRedirect: false # envoy setting
  
    psql:
      host: gitlab-db-rw.gitlab.svc.cluster.local
      username: gitlab
      database: gitlabhq_production
      password:
        secret: gitlab-secret
        key: password

    redis:
      host: valkey.valkey.svc.cluster.local
      auth:
        enabled: false

  gitlab-runner:
    gitlabUrl: "https://gitlab.lab.mpopov.net/"

  gitaly:
    tls:
      enabled: false
  praefect:
    tls:
      enabled: false
  workhorse:
    tls:
      enabled: false
  registry:
    gatewayRoute:
      sectionName: null
    tls:
      enabled: false
  cell:
    topologyServiceClient:
      tls:
        enabled: false
  gitlab:
