apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd # must be where Argo CD is installed
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://helm.min.io/
      targetRevision: v5.6.4
      chart: aistor-operator
      helm:
        values: |
          {{- toYaml .Values.minio | nindent 10 }}

    - repoURL: https://github.com/mpopov678/test-cluster.git
      path: apps/minio
      targetRevision: HEAD
      helm:
        values: |
          {{- toYaml .Values.minioConfigs | nindent 10 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true