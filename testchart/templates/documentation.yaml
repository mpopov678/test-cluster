apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: documentation
  namespace: argocd # must be where Argo CD is installed
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mpopov678/test-cluster.git
    path: apps/documentation
    targetRevision: HEAD
    helm:
      values: |
        {{- toYaml .Values.documentation | nindent 10 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: documentation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true