apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd # must be where Argo CD is installed
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://charts.rustfs.com
      targetRevision: v0.4.0
      chart: rustfs
      helm:
        values: |
          {{- toYaml .Values.rustfs | nindent 10 }}

    - repoURL: https://github.com/mpopov678/test-cluster.git
      path: apps/rustfs
      targetRevision: HEAD
      helm:
        values: |
          {{- toYaml .Values.rustfsConfigs | nindent 10 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true