apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: argocd-grpcroute
  namespace: argocd
spec:
  hostnames:
  - argocd.local
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: eg
    namespace: networking
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 443
      weight: 1
    matches:
    - headers:
      - name: Content-Type
        type: RegularExpression
        value: ^application/grpc.*$
---
